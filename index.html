<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Tracker</title>
<script type="text/javascript" src="https://eia.followupboss.com/embeddedApps-v1.0.1.js"></script>
<style>
  /* System font stack — zero network requests, renders instantly */
  :root {
    --bg: #ffffff;
    --surface: #f7f8fa;
    --border: #e0e3eb;
    --accent: #2563eb;
    --green: #16a34a;
    --yellow: #d97706;
    --red: #dc2626;
    --purple: #7c3aed;
    --text: #111827;
    --muted: #6b7280;
    --mono: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); padding: 14px; }
  .widget { max-width: 480px; margin: 0 auto; }

  /* Loading — shown immediately, replaced fast */
  #loadingState {
    text-align: center; padding: 30px 20px;
    font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #errorState {
    display: none; text-align: center; padding: 28px 20px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    border: 1px dashed var(--border); border-radius: 10px;
  }
  #mainContent { display: none; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .title { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .contact-name {
    font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--accent);
    background: #eff6ff; border: 1px solid #bfdbfe; padding: 2px 9px; border-radius: 4px;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Period Toggle */
  .period-row { display: flex; gap: 5px; margin-bottom: 12px; }
  .period-btn {
    flex: 1; font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px; padding: 6px 2px;
    cursor: pointer; transition: border-color 0.1s, color 0.1s, background 0.1s;
  }
  .period-btn:hover { border-color: var(--accent); color: var(--accent); }
  .period-btn.active { background: #eff6ff; border-color: var(--accent); color: var(--accent); }

  /* Summary cards */
  .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; position: relative; overflow: hidden;
  }
  .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .summary-card.attempts-card::before { background: var(--accent); }
  .summary-card.convos-card::before   { background: var(--green); }
  .summary-num { font-family: var(--mono); font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
  .summary-card.attempts-card .summary-num { color: var(--accent); }
  .summary-card.convos-card .summary-num   { color: var(--green); }
  .summary-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .summary-sub { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

  /* Breakdown stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 7px 5px; text-align: center; position: relative; overflow: hidden; }
  .stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .stat.no-answer::before { background: var(--yellow); }
  .stat.voicemail::before { background: var(--purple); }
  .stat.connected::before { background: var(--green); }
  .stat.wrong::before     { background: var(--red); }
  .stat-num { font-family: var(--mono); font-size: 17px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
  .stat.no-answer .stat-num { color: var(--yellow); }
  .stat.voicemail .stat-num { color: var(--purple); }
  .stat.connected .stat-num { color: var(--green); }
  .stat.wrong .stat-num     { color: var(--red); }
  .stat-label { font-size: 9px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }

  /* Log buttons */
  .log-section { margin-bottom: 10px; }
  .log-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; font-family: var(--mono); }
  .outcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .outcome-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 10px 9px;
    border-radius: 7px; cursor: pointer; display: flex; align-items: center; gap: 7px;
    transition: background 0.1s, border-color 0.1s, color 0.1s; letter-spacing: 0.03em;
  }
  .outcome-btn:active { opacity: 0.8; }
  .outcome-btn.no-answer:hover { background: #fffbeb; border-color: var(--yellow); color: var(--yellow); }
  .outcome-btn.voicemail:hover { background: #f5f3ff; border-color: var(--purple); color: var(--purple); }
  .outcome-btn.connected:hover { background: #f0fdf4; border-color: var(--green);  color: var(--green); }
  .outcome-btn.wrong:hover     { background: #fef2f2; border-color: var(--red);    color: var(--red); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .no-answer .dot { background: var(--yellow); }
  .voicemail .dot { background: var(--purple); }
  .connected .dot { background: var(--green); }
  .wrong .dot     { background: var(--red); }

  /* Note */
  .note-section { margin-bottom: 10px; }
  .note-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: var(--sans); font-size: 12px; padding: 8px 11px;
    resize: none; transition: border-color 0.15s; outline: none;
  }
  .note-input:focus { border-color: var(--accent); }
  .note-input::placeholder { color: var(--muted); }

  /* History */
  .divider { height: 1px; background: var(--border); margin: 10px 0; }
  .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .history-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .reset-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px;
    cursor: pointer; transition: border-color 0.1s, color 0.1s;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  .log-list { display: flex; flex-direction: column; gap: 5px; max-height: 190px; overflow-y: auto; padding-right: 2px; }
  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log-entry {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 11px; display: flex; align-items: flex-start; gap: 9px;
  }
  .log-entry.is-convo { border-left: 3px solid var(--green); }
  .entry-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .entry-body { flex: 1; min-width: 0; }
  .entry-outcome { font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1px; }
  .entry-contact { font-size: 10px; color: var(--accent); font-family: var(--mono); }
  .entry-note { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .convo-badge {
    font-family: var(--mono); font-size: 8px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--green); background: #f0fdf4;
    border: 1px solid #bbf7d0; border-radius: 3px; padding: 1px 4px; margin-left: 5px; vertical-align: middle;
  }
  .entry-time { font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .empty-state {
    text-align: center; padding: 18px; font-family: var(--mono); font-size: 11px;
    color: var(--muted); border: 1px dashed var(--border); border-radius: 7px;
  }

  /* Confirm modal */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex;
    align-items: center; justify-content: center; z-index: 100;
    opacity: 0; pointer-events: none; transition: opacity 0.15s;
  }
  .confirm-overlay.active { opacity: 1; pointer-events: all; }
  .confirm-box {
    background: #fff; border: 1px solid var(--red); border-radius: 10px; padding: 22px;
    max-width: 290px; width: 90%; box-shadow: 0 8px 28px rgba(0,0,0,0.1);
    transform: scale(0.96); transition: transform 0.15s;
  }
  .confirm-overlay.active .confirm-box { transform: scale(1); }
  .confirm-title { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--red); margin-bottom: 7px; }
  .confirm-text { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .confirm-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 9px;
    margin-bottom: 12px; outline: none;
  }
  .confirm-input:focus { border-color: var(--red); }
  .confirm-input::placeholder { color: var(--muted); }
  .confirm-btns { display: flex; gap: 7px; }
  .btn-cancel {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    font-family: var(--mono); font-size: 11px; padding: 8px; border-radius: 5px; cursor: pointer;
  }
  .btn-confirm-reset {
    flex: 1; background: #fef2f2; border: 1px solid var(--red); color: var(--red);
    font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 8px; border-radius: 5px;
    cursor: pointer; opacity: 0.4; pointer-events: none;
  }
  .btn-confirm-reset.enabled { opacity: 1; pointer-events: all; }

  /* Toast */
  .toast {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%) translateY(50px);
    background: #111827; color: #fff; font-family: var(--mono); font-size: 11px;
    padding: 8px 16px; border-radius: 7px; transition: transform 0.2s; z-index: 200; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="widget">

  <div id="loadingState">
    <div class="spinner"></div>
    Connecting...
  </div>

  <div id="errorState">
    <div style="font-size:22px;margin-bottom:8px">📵</div>
    Open this inside Follow Up Boss.
  </div>

  <div id="mainContent">
    <div class="header">
      <div class="title">📞 Call Tracker</div>
      <div class="contact-name" id="contactDisplay">—</div>
    </div>

    <div class="period-row">
      <button class="period-btn" data-period="week"    onclick="setPeriod('week')">Week</button>
      <button class="period-btn" data-period="month"   onclick="setPeriod('month')">Month</button>
      <button class="period-btn" data-period="quarter" onclick="setPeriod('quarter')">Qtr</button>
      <button class="period-btn" data-period="year"    onclick="setPeriod('year')">Year</button>
      <button class="period-btn active" data-period="all" onclick="setPeriod('all')">All</button>
    </div>

    <div class="summary-row">
      <div class="summary-card attempts-card">
        <div class="summary-num" id="summaryAttempts">0</div>
        <div class="summary-label">Attempts</div>
        <div class="summary-sub" id="summaryAttemptsNote">all time</div>
      </div>
      <div class="summary-card convos-card">
        <div class="summary-num" id="summaryConvos">0</div>
        <div class="summary-label">Conversations</div>
        <div class="summary-sub">Connected calls</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat no-answer"><div class="stat-num" id="count-no-answer">0</div><div class="stat-label">No Ans.</div></div>
      <div class="stat voicemail"><div class="stat-num" id="count-voicemail">0</div><div class="stat-label">V-Mail</div></div>
      <div class="stat connected"><div class="stat-num" id="count-connected">0</div><div class="stat-label">Conn.</div></div>
      <div class="stat wrong"><div class="stat-num" id="count-wrong">0</div><div class="stat-label">Wrong#</div></div>
    </div>

    <div class="log-section">
      <div class="log-label">Log Attempt</div>
      <div class="outcome-grid">
        <button class="outcome-btn no-answer" onclick="logAttempt('No Answer')"><span class="dot"></span>No Answer</button>
        <button class="outcome-btn voicemail" onclick="logAttempt('Left Voicemail')"><span class="dot"></span>Left Voicemail</button>
        <button class="outcome-btn connected" onclick="logAttempt('Connected')"><span class="dot"></span>Connected</button>
        <button class="outcome-btn wrong"     onclick="logAttempt('Wrong Number')"><span class="dot"></span>Wrong Number</button>
      </div>
    </div>

    <div class="note-section">
      <textarea class="note-input" id="noteInput" rows="2" placeholder="Optional note..."></textarea>
    </div>

    <div class="divider"></div>

    <div class="history-header">
      <div class="history-label">History <span id="historyPeriodLabel" style="opacity:0.55;font-weight:400">(all time)</span></div>
      <button class="reset-btn" onclick="showResetConfirm()">Reset All</button>
    </div>

    <div class="log-list" id="logList">
      <div class="empty-state">No calls logged yet</div>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">⚠ Reset All Data?</div>
    <div class="confirm-text">Permanently deletes all call history. Type <strong style="color:#dc2626">RESET</strong> to confirm.</div>
    <input class="confirm-input" id="confirmInput" placeholder='Type "RESET" here' oninput="checkConfirmInput(this.value)">
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="hideResetConfirm()">Cancel</button>
      <button class="btn-confirm-reset" id="confirmResetBtn" onclick="doReset()">Wipe All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var OUTCOME_COLORS = {
    'No Answer':      '#d97706',
    'Left Voicemail': '#7c3aed',
    'Connected':      '#16a34a',
    'Wrong Number':   '#dc2626'
  };
  var STORAGE_KEY = 'fub_calls_global_v2';
  var PERIOD_LABELS = { week:'this week', month:'this month', quarter:'this quarter', year:'this year', all:'all time' };

  var currentPeriod     = 'all';
  var currentPersonId   = null;
  var currentPersonName = null;
  var sdkReady          = false;

  // ── Render immediately with whatever data exists — don't wait for SDK ──────
  // This makes the widget feel instant; contact name updates once SDK fires.
  (function earlyRender() {
    var data = loadData();
    if (data.attempts.length > 0) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('mainContent').style.display  = 'block';
      renderStats(data);
    }
  })();

  // ── FUB SDK ────────────────────────────────────────────────────────────────
  window.onEmbeddedAppSdkReady = function(sdk) {
    sdkReady = true;
    sdk.getPerson(function(person) {
      if (!person || !person.id) return;
      currentPersonId   = String(person.id);
      currentPersonName = person.name || ('Contact #' + currentPersonId);
      showWidget();
    });
    sdk.on('personUpdated', function(person) {
      if (!person || !person.id) return;
      currentPersonId   = String(person.id);
      currentPersonName = person.name || ('Contact #' + currentPersonId);
      render();
    });
  };

  // Reduced to 2.5s — if SDK hasn't fired by then, show error
  setTimeout(function() {
    if (!sdkReady) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display   = 'block';
    }
  }, 2500);

  function showWidget() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display   = 'none';
    document.getElementById('mainContent').style.display  = 'block';
    render();
  }

  // ── Storage ────────────────────────────────────────────────────────────────
  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { attempts: [] }; }
    catch(e) { return { attempts: [] }; }
  }
  function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

  // ── Period ─────────────────────────────────────────────────────────────────
  function setPeriod(p) {
    currentPeriod = p;
    document.querySelectorAll('.period-btn').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-period') === p);
    });
    render();
  }

  function getPeriodStart(period) {
    var now = new Date();
    if (period === 'all') return null;
    if (period === 'week')    { var d = new Date(now); d.setDate(d.getDate() - d.getDay()); d.setHours(0,0,0,0); return d; }
    if (period === 'month')   return new Date(now.getFullYear(), now.getMonth(), 1);
    if (period === 'quarter') return new Date(now.getFullYear(), Math.floor(now.getMonth()/3)*3, 1);
    if (period === 'year')    return new Date(now.getFullYear(), 0, 1);
    return null;
  }

  function filterAttempts(attempts, period) {
    var start = getPeriodStart(period);
    if (!start) return attempts;
    return attempts.filter(function(a) { return new Date(a.time) >= start; });
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    renderStats(loadData());
  }

  function renderStats(data) {
    var filtered = filterAttempts(data.attempts, currentPeriod);
    var label    = PERIOD_LABELS[currentPeriod];

    document.getElementById('contactDisplay').textContent          = currentPersonName || '—';
    document.getElementById('historyPeriodLabel').textContent      = '(' + label + ')';
    document.getElementById('summaryAttempts').textContent         = filtered.length;
    document.getElementById('summaryAttemptsNote').textContent     = label;
    document.getElementById('summaryConvos').textContent           = filtered.filter(function(a) { return a.outcome === 'Connected'; }).length;

    var counts = { 'No Answer':0, 'Left Voicemail':0, 'Connected':0, 'Wrong Number':0 };
    filtered.forEach(function(a) { if (counts[a.outcome] !== undefined) counts[a.outcome]++; });
    document.getElementById('count-no-answer').textContent = counts['No Answer'];
    document.getElementById('count-voicemail').textContent = counts['Left Voicemail'];
    document.getElementById('count-connected').textContent = counts['Connected'];
    document.getElementById('count-wrong').textContent     = counts['Wrong Number'];

    var list = document.getElementById('logList');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">No calls logged ' + (currentPeriod === 'all' ? 'yet' : 'in this period') + '</div>';
      return;
    }
    // Build HTML string in one pass — faster than multiple DOM ops
    var html = '';
    var rev  = filtered.slice().reverse();
    for (var i = 0; i < rev.length; i++) {
      var a       = rev[i];
      var color   = OUTCOME_COLORS[a.outcome] || '#6b7280';
      var d       = new Date(a.time);
      var ts      = d.toLocaleDateString([],{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      var isConvo = a.outcome === 'Connected';
      html += '<div class="log-entry' + (isConvo ? ' is-convo' : '') + '">' +
        '<div class="entry-dot" style="background:' + color + '"></div>' +
        '<div class="entry-body">' +
          '<div class="entry-outcome" style="color:' + color + '">' + escHtml(a.outcome) + (isConvo ? '<span class="convo-badge">Convo</span>' : '') + '</div>' +
          (a.personName ? '<div class="entry-contact">' + escHtml(a.personName) + '</div>' : '') +
          (a.note       ? '<div class="entry-note">'    + escHtml(a.note)       + '</div>' : '') +
        '</div>' +
        '<div class="entry-time">' + ts + '</div>' +
      '</div>';
    }
    list.innerHTML = html;
  }

  // ── Actions ────────────────────────────────────────────────────────────────
  function logAttempt(outcome) {
    var note = document.getElementById('noteInput').value.trim();
    var data = loadData();
    data.attempts.push({ outcome:outcome, note:note, time:new Date().toISOString(), personId:currentPersonId||null, personName:currentPersonName||null });
    saveData(data);
    document.getElementById('noteInput').value = '';
    render();
    showToast('✓ ' + outcome + (outcome === 'Connected' ? ' + Convo' : ''));
  }

  function showResetConfirm() {
    document.getElementById('confirmInput').value = '';
    document.getElementById('confirmResetBtn').classList.remove('enabled');
    document.getElementById('confirmOverlay').classList.add('active');
    setTimeout(function() { document.getElementById('confirmInput').focus(); }, 80);
  }
  function hideResetConfirm() { document.getElementById('confirmOverlay').classList.remove('active'); }
  function checkConfirmInput(v) {
    document.getElementById('confirmResetBtn').classList.toggle('enabled', v.trim().toUpperCase() === 'RESET');
  }
  function doReset() { saveData({ attempts:[] }); hideResetConfirm(); render(); showToast('All data reset.'); }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) hideResetConfirm();
  });
</script>
</body>
</html>
