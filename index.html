<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Tracker</title>
<script type="text/javascript" src="https://eia.followupboss.com/embeddedApps-v1.0.1.js"></script>
<style>
  :root {
    --bg:#fff; --sf:#f7f8fa; --bd:#e0e3eb;
    --blue:#2563eb; --green:#16a34a; --yellow:#d97706;
    --red:#dc2626; --purple:#7c3aed; --orange:#ea580c;
    --text:#111827; --muted:#6b7280;
    --mono:ui-monospace,'SF Mono','Cascadia Mono',monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);padding:0;}
  .w{width:100%;display:flex;flex-direction:column;gap:7px;padding:8px;}

  /* ─── DTD2 ─────────────────────────────────────────────────────── */
  .dtd2{background:linear-gradient(90deg,#1e3a8a,#2563eb);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px;}
  .dtd2-label{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);white-space:nowrap;}
  .dtd2-wk{font-family:var(--mono);font-size:10px;font-weight:700;color:rgba(255,255,255,0.8);}
  .dtd2-pills{display:flex;gap:6px;flex:1;justify-content:center;}
  .dtd2-pill{background:rgba(255,255,255,0.14);border-radius:6px;padding:4px 10px;text-align:center;}
  .dtd2-pl{font-size:8px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:1px;}
  .dtd2-pv{font-family:var(--mono);font-size:14px;font-weight:700;color:#fff;line-height:1;}
  .dtd2-range{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,0.45);text-align:right;white-space:nowrap;line-height:1.4;}

  /* ─── Goal ─────────────────────────────────────────────────────── */
  .goal{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:7px 11px;}
  .goal-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .goal-lbl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
  .goal-nums{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);margin-left:2px;}
  .gadjs{display:flex;gap:3px;margin-left:2px;}
  .gadj{background:none;border:1px solid var(--bd);color:var(--muted);font-size:11px;width:18px;height:18px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);}
  .gadj:hover{border-color:var(--blue);color:var(--blue);}
  .goal-msg{font-family:var(--mono);font-size:9px;margin-left:auto;}
  .goal-pct{font-family:var(--mono);font-size:9px;font-weight:700;margin-left:5px;}
  .gtrack{background:var(--bd);border-radius:99px;height:5px;overflow:hidden;}
  .gfill{height:100%;border-radius:99px;background:var(--blue);transition:width 0.4s;}
  .gfill.hit{background:var(--green);}
  .gfill.over{background:var(--orange);}

  /* ─── Log buttons ───────────────────────────────────────────────── */
  .log-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .lbtn{background:var(--sf);border:1px solid var(--bd);color:var(--text);font-family:var(--mono);font-size:11px;font-weight:600;padding:9px 10px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.12s;letter-spacing:0.02em;}
  .lbtn:active{transform:scale(0.97);}
  .lbtn.na:hover{background:#fffbeb;border-color:var(--yellow);color:var(--yellow);}
  .lbtn.vm:hover{background:#f5f3ff;border-color:var(--purple);color:var(--purple);}
  .lbtn.cn:hover{background:#f0fdf4;border-color:var(--green);color:var(--green);}
  .lbtn.wn:hover{background:#fef2f2;border-color:var(--red);color:var(--red);}
  .ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .na .ldot{background:var(--yellow);}
  .vm .ldot{background:var(--purple);}
  .cn .ldot{background:var(--green);}
  .wn .ldot{background:var(--red);}

  /* ─── Note ──────────────────────────────────────────────────────── */
  .note{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:11px;padding:6px 10px;resize:none;outline:none;transition:border-color 0.15s;}
  .note:focus{border-color:var(--blue);}
  .note::placeholder{color:var(--muted);}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
  .hidden{display:none;}

  /* ─── Metrics collapsible ────────────────────────────────────────── */
  .section{background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
  .sec-head{display:flex;align-items:center;padding:6px 10px;gap:5px;cursor:pointer;user-select:none;}
  .sec-head:hover{background:#f0f0f0;}
  .sec-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
  .chev{font-size:10px;color:var(--muted);margin-left:auto;transition:transform 0.2s;}
  .chev.open{transform:rotate(180deg);}
  .sec-body{display:none;border-top:1px solid var(--bd);}
  .sec-body.open{display:block;}

  /* period pills row inside metrics */
  .pill-bar{display:flex;align-items:center;gap:3px;padding:6px 10px;border-bottom:1px solid var(--bd);flex-wrap:wrap;}
  .ppill{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.04em;background:none;border:1px solid var(--bd);color:var(--muted);border-radius:4px;padding:2px 7px;cursor:pointer;transition:all 0.1s;}
  .ppill:hover,.ppill.active{background:#eff6ff;border-color:var(--blue);color:var(--blue);}
  .cl-wrap{display:flex;gap:3px;margin-left:auto;}
  .clp{font-family:var(--mono);font-size:9px;font-weight:700;background:none;border:1px solid var(--bd);color:var(--muted);border-radius:4px;padding:2px 7px;cursor:pointer;transition:all 0.1s;}
  .clp.cur.on{background:#eff6ff;border-color:var(--blue);color:var(--blue);}
  .clp.lst.on{background:#f5f3ff;border-color:var(--purple);color:var(--purple);}

  /* custom range */
  .cust-row{display:flex;align-items:center;gap:4px;padding:5px 10px;border-bottom:1px solid var(--bd);}
  .di{flex:1;font-family:var(--mono);font-size:9px;background:#fff;border:1px solid var(--bd);border-radius:4px;padding:3px 5px;color:var(--text);outline:none;}
  .di:focus{border-color:var(--blue);}
  .dgo{font-family:var(--mono);font-size:9px;font-weight:700;background:#eff6ff;border:1px solid var(--blue);color:var(--blue);border-radius:4px;padding:3px 8px;cursor:pointer;}
  .dgo:hover{background:var(--blue);color:#fff;}
  .dclr{font-family:var(--mono);font-size:9px;background:none;border:1px solid var(--bd);color:var(--muted);border-radius:4px;padding:3px 6px;cursor:pointer;}
  .dclr:hover{border-color:var(--red);color:var(--red);}

  .rbanner{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:center;padding:4px 10px;border-bottom:1px solid var(--bd);}
  .rbanner strong{color:var(--text);}

  /* 4 stat cards */
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--bd);}
  .sc{padding:7px 5px;text-align:center;border-right:1px solid var(--bd);position:relative;}
  .sc:last-child{border-right:none;}
  .sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .sa::before{background:var(--blue);}
  .sv::before{background:var(--green);}
  .sr::before{background:var(--orange);}
  .sq::before{background:var(--purple);}
  .sn{font-family:var(--mono);font-size:17px;font-weight:700;line-height:1;margin-bottom:1px;}
  .sa .sn{color:var(--blue);}
  .sv .sn{color:var(--green);}
  .sr .sn{color:var(--orange);}
  .sq .sn{color:var(--purple);}
  .sl{font-size:8px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);}
  .sd{font-family:var(--mono);font-size:8px;margin-top:2px;}
  .sd.up{color:var(--green);}
  .sd.dn{color:var(--red);}
  .sd.fl{color:var(--muted);}

  /* breakdown */
  .bk-row{display:grid;grid-template-columns:repeat(4,1fr);}
  .bc{padding:5px 4px;text-align:center;border-right:1px solid var(--bd);}
  .bc:last-child{border-right:none;}
  .bn{font-family:var(--mono);font-size:13px;font-weight:700;}
  .bc.bna .bn{color:var(--yellow);}
  .bc.bvm .bn{color:var(--purple);}
  .bc.bcn .bn{color:var(--green);}
  .bc.bwn .bn{color:var(--red);}
  .bl{font-size:8px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}

  /* ─── History ────────────────────────────────────────────────────── */
  .hist-actions{display:flex;gap:4px;align-items:center;padding:0 4px;}
  .hbtn{font-family:var(--mono);font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px;cursor:pointer;border:1px solid;transition:all 0.1s;}
  .hbtn.cv{background:#f0fdf4;border-color:#bbf7d0;color:var(--green);}
  .hbtn.cv:hover{background:var(--green);color:#fff;border-color:var(--green);}
  .hbtn.ca{background:#eff6ff;border-color:#bfdbfe;color:var(--blue);}
  .hbtn.ca:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
  .hbtn.rs{background:none;border-color:var(--bd);color:var(--muted);}
  .hbtn.rs:hover{border-color:var(--red);color:var(--red);}
  .hist-count{background:var(--blue);color:#fff;font-family:var(--mono);font-size:7px;font-weight:700;padding:1px 5px;border-radius:99px;margin-left:4px;}
  .log-list{display:flex;flex-direction:column;gap:4px;max-height:190px;overflow-y:auto;padding:7px;}
  .log-list::-webkit-scrollbar{width:3px;}
  .log-list::-webkit-scrollbar-thumb{background:var(--bd);}
  .le{background:#fff;border:1px solid var(--bd);border-radius:5px;padding:6px 9px;display:flex;align-items:flex-start;gap:6px;}
  .le.con{border-left:3px solid var(--green);}
  .edot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}
  .eb{flex:1;min-width:0;}
  .eo{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;}
  .en{font-size:10px;color:var(--blue);font-family:var(--mono);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .enote{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cbadge{font-family:var(--mono);font-size:7px;font-weight:700;text-transform:uppercase;color:var(--green);background:#f0fdf4;border:1px solid #bbf7d0;border-radius:2px;padding:1px 3px;margin-left:3px;vertical-align:middle;}
  .et{font-family:var(--mono);font-size:8px;color:var(--muted);flex-shrink:0;}
  .empty{text-align:center;padding:14px;font-family:var(--mono);font-size:10px;color:var(--muted);}

  /* ─── Confirm modal ─────────────────────────────────────────────── */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.15s;}
  .ov.on{opacity:1;pointer-events:all;}
  .cbox{background:#fff;border:1px solid var(--red);border-radius:10px;padding:18px;max-width:270px;width:90%;box-shadow:0 8px 28px rgba(0,0,0,0.12);transform:scale(0.96);transition:transform 0.15s;}
  .ov.on .cbox{transform:scale(1);}
  .ct{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--red);margin-bottom:5px;}
  .cx{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
  .ci{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 8px;margin-bottom:10px;outline:none;}
  .ci:focus{border-color:var(--red);}
  .cbtns{display:flex;gap:6px;}
  .ccn{flex:1;background:var(--sf);border:1px solid var(--bd);color:var(--muted);font-family:var(--mono);font-size:10px;padding:7px;border-radius:5px;cursor:pointer;}
  .cok{flex:1;background:#fef2f2;border:1px solid var(--red);color:var(--red);font-family:var(--mono);font-size:10px;font-weight:700;padding:7px;border-radius:5px;cursor:pointer;opacity:0.4;pointer-events:none;}
  .cok.on{opacity:1;pointer-events:all;}

  /* ─── Toast ─────────────────────────────────────────────────────── */
  .toast{position:fixed;bottom:10px;left:50%;transform:translateX(-50%) translateY(36px);background:#111827;color:#fff;font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:6px;transition:transform 0.2s;z-index:200;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="w">

<div class="hidden"><span id="sdkDot"></span><span id="cname"></span></div>

  <!-- 1. DTD2 + contact name -->
  <div class="dtd2">
    <div>
      <div class="dtd2-label">DTD2</div>
      <div class="dtd2-wk" id="dtd2wk">Wk —</div>
    </div>
    <div class="dtd2-pills">
      <div class="dtd2-pill">
        <div class="dtd2-pl">📞 Call</div>
        <div class="dtd2-pv" id="dtd2call">—</div>
      </div>
      <div class="dtd2-pill">
        <div class="dtd2-pl">💬 Text</div>
        <div class="dtd2-pv" id="dtd2text">—</div>
      </div>
    </div>
    <div style="text-align:right">
      <div class="dtd2-range" id="dtd2range">—</div>
      <div id="contactBadge" style="margin-top:3px;font-family:var(--mono);font-size:9px;font-weight:700;color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.15);border-radius:4px;padding:2px 6px;display:none;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
    </div>
  </div>

  <!-- 2. Goal -->
  <div class="goal">
    <div class="goal-top">
      <div class="goal-lbl">🎯 Goal</div>
      <div class="goal-nums"><span id="gToday">0</span>/<span id="gTarget">20</span></div>
      <div class="gadjs">
        <button class="gadj" onclick="adjGoal(-5)">−</button>
        <button class="gadj" onclick="adjGoal(5)">+</button>
      </div>
      <div class="goal-msg" id="gMsg" style="color:var(--muted)">Start!</div>
      <div class="goal-pct" id="gPct" style="color:var(--muted)">0%</div>
    </div>
    <div class="gtrack"><div class="gfill" id="gFill" style="width:0%"></div></div>
  </div>

  <!-- 3. Log buttons -->
  <div class="log-grid" id="logGrid">
    <button class="lbtn na" onclick="doLog('No Answer')"><span class="ldot"></span>No Answer</button>
    <button class="lbtn vm" onclick="doLog('Left Voicemail')"><span class="ldot"></span>Left Voicemail</button>
    <button class="lbtn cn" onclick="doLog('Connected')"><span class="ldot"></span>Conversation</button>
    <button class="lbtn wn" onclick="doLog('Wrong Number')"><span class="ldot"></span>Wrong Number</button>
  </div>

  <!-- Note -->
  <textarea class="note" id="noteInput" rows="3" placeholder="Name – Note…"></textarea>

  <!-- 4. Metrics (collapsible) -->
  <div class="section">
    <div class="sec-head" onclick="toggleSec('metrics')">
      <div class="sec-title">Metrics</div>
      <div class="chev open" id="chev-metrics">▾</div>
    </div>
    <div class="sec-body open" id="body-metrics">
      <!-- Period pills -->
      <div class="pill-bar">
        <button class="ppill active" data-p="week"    onclick="setPeriod('week')">Wk</button>
        <button class="ppill"        data-p="month"   onclick="setPeriod('month')">Mo</button>
        <button class="ppill"        data-p="quarter" onclick="setPeriod('quarter')">Qt</button>
        <button class="ppill"        data-p="year"    onclick="setPeriod('year')">Yr</button>
        <button class="ppill"        data-p="all"     onclick="setPeriod('all')">All</button>
        <button class="ppill"        data-p="custom"  onclick="setPeriod('custom')">…</button>
        <div class="cl-wrap" id="clWrap">
          <button class="clp cur on" id="clC" onclick="setFrame('current')">▶ Cur</button>
          <button class="clp lst"    id="clL" onclick="setFrame('last')">◀ Last</button>
        </div>
      </div>
      <!-- Custom range -->
      <div class="cust-row" id="custRow" style="display:none">
        <input type="date" class="di" id="dS">
        <span style="font-family:var(--mono);font-size:9px;color:var(--muted)">–</span>
        <input type="date" class="di" id="dE">
        <button class="dgo" onclick="applyCustom()">Go</button>
        <button class="dclr" onclick="clearCustom()">✕</button>
      </div>
      <div class="rbanner" id="rbanner">—</div>
      <!-- 4 stat cards -->
      <div class="stat-row">
        <div class="sc sa"><div class="sn" id="mA">0</div><div class="sl">Attempts</div><div class="sd" id="dA"></div></div>
        <div class="sc sv"><div class="sn" id="mC">0</div><div class="sl">Convos</div><div class="sd" id="dC"></div></div>
        <div class="sc sr"><div class="sn" id="mR">—</div><div class="sl">Rate</div></div>
        <div class="sc sq"><div class="sn" id="mQ">—</div><div class="sl">Avg/Con</div></div>
      </div>
      <!-- Breakdown -->
      <div class="bk-row">
        <div class="bc bna"><div class="bn" id="bNA">0</div><div class="bl">No Ans</div></div>
        <div class="bc bvm"><div class="bn" id="bVM">0</div><div class="bl">V-Mail</div></div>
        <div class="bc bcn"><div class="bn" id="bCN">0</div><div class="bl">Conv</div></div>
        <div class="bc bwn"><div class="bn" id="bWN">0</div><div class="bl">Wrong#</div></div>
      </div>
    </div>
  </div>

  <!-- 5. History (collapsible) -->
  <div class="section">
    <div class="sec-head" onclick="toggleSec('hist')">
      <div class="sec-title">History <span class="hist-count" id="histCount">0</span></div>
      <div class="hist-actions" onclick="event.stopPropagation()">
        <button class="hbtn cv" onclick="exportCSV(false)">CSV</button>
        <button class="hbtn ca" onclick="exportCSV(true)">CSV All</button>
        <button class="hbtn rs" onclick="showReset()">Reset</button>
      </div>
      <div class="chev open" id="chev-hist">▾</div>
    </div>
    <div class="sec-body open" id="body-hist">
      <div class="log-list" id="logList"><div class="empty">No calls yet</div></div>
    </div>
  </div>

</div>

<!-- Confirm modal -->
<div class="ov" id="ov">
  <div class="cbox">
    <div class="ct">⚠ Reset All Data?</div>
    <div class="cx">Permanently deletes all history. Type <strong style="color:var(--red)">RESET</strong> to confirm.</div>
    <input class="ci" id="ci" placeholder='Type "RESET"' oninput="checkReset(this.value)">
    <div class="cbtns">
      <button class="ccn" onclick="hideReset()">Cancel</button>
      <button class="cok" id="cok" onclick="doReset()">Wipe All</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

// ── App state ─────────────────────────────────────────────────────────────────
var SK='fub_calls_global_v4',GK='fub_calls_goal';
var OC={'No Answer':'#d97706','Left Voicemail':'#7c3aed','Connected':'#16a34a','Wrong Number':'#dc2626'};
var period='week',frame='current',csS=null,csE=null;
var pid=null,pname=null;
var secOpen={metrics:true,hist:true};

render();renderGoal();

// ── FUB SDK ───────────────────────────────────────────────────────────────────
function updateContact(p){
  if(!p||!p.id)return;
  pid=String(p.id);pname=p.name||('Contact #'+p.id);
  var badge=document.getElementById('contactBadge');
  if(badge){badge.textContent=pname;badge.style.display='block';}
  document.getElementById('sdkDot').className='sdk-dot live';
  render();
}

window.onEmbeddedAppSdkReady=function(sdk){
  sdk.getPerson(function(p){ updateContact(p); });
  sdk.on('personUpdated',function(p){ updateContact(p); });
  var attempts=0;
  var retry=setInterval(function(){
    if(pid){clearInterval(retry);return;}
    if(++attempts>6){clearInterval(retry);return;}
    sdk.getPerson(function(p){if(p&&p.id){updateContact(p);clearInterval(retry);}});
  },500);
};

// ── Storage ───────────────────────────────────────────────────────────────────
function load(){try{return JSON.parse(localStorage.getItem(SK))||{attempts:[]};}catch(e){return{attempts:[]};}}
function save(d){localStorage.setItem(SK,JSON.stringify(d));}
function getGoal(){return parseInt(localStorage.getItem(GK))||20;}
function saveGoal(v){localStorage.setItem(GK,v);}

// ── Date helpers ──────────────────────────────────────────────────────────────
function sunOf(d){var dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()-dt.getDay());return dt;}
function getRange(p,f){
  var now=new Date();
  if(p==='all')return{s:null,e:null};
  if(p==='custom')return{s:csS,e:csE?new Date(csE.getTime()+86400000):null};
  var s,e;
  if(p==='week'){var sun=sunOf(now),nx=new Date(sun);nx.setDate(sun.getDate()+7);if(f==='current'){s=sun;e=nx;}else{e=sun;s=new Date(sun);s.setDate(sun.getDate()-7);}}
  else if(p==='month'){if(f==='current'){s=new Date(now.getFullYear(),now.getMonth(),1);e=new Date(now.getFullYear(),now.getMonth()+1,1);}else{s=new Date(now.getFullYear(),now.getMonth()-1,1);e=new Date(now.getFullYear(),now.getMonth(),1);}}
  else if(p==='quarter'){var q=Math.floor(now.getMonth()/3);if(f==='current'){s=new Date(now.getFullYear(),q*3,1);e=new Date(now.getFullYear(),q*3+3,1);}else{var pq=q-1,py=now.getFullYear();if(pq<0){pq=3;py--;}s=new Date(py,pq*3,1);e=new Date(now.getFullYear(),q*3,1);}}
  else if(p==='year'){if(f==='current'){s=new Date(now.getFullYear(),0,1);e=new Date(now.getFullYear()+1,0,1);}else{s=new Date(now.getFullYear()-1,0,1);e=new Date(now.getFullYear(),0,1);}}
  return{s:s,e:e};
}
function filt(arr,r){
  if(!r.s&&!r.e)return arr;
  return arr.filter(function(a){var t=new Date(a.time);return(!r.s||t>=r.s)&&(!r.e||t<r.e);});
}
function rl(p,f){
  if(p==='all')return'All Time';
  if(p==='custom'){if(!csS||!csE)return'Custom';var fm={month:'short',day:'numeric'};return csS.toLocaleDateString([],fm)+' – '+csE.toLocaleDateString([],fm);}
  var r=getRange(p,f),fm={month:'short',day:'numeric'};
  return r.s.toLocaleDateString([],fm)+' – '+new Date(r.e-1).toLocaleDateString([],fm);
}

// ── Period controls ───────────────────────────────────────────────────────────
function setPeriod(p){
  period=p;
  document.querySelectorAll('.ppill').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-p')===p);});
  var isAll=p==='all',isCust=p==='custom';
  document.getElementById('clWrap').style.display=(isAll||isCust)?'none':'flex';
  document.getElementById('custRow').style.display=isCust?'flex':'none';
  render();
}
function setFrame(f){
  frame=f;
  document.getElementById('clC').className='clp cur'+(f==='current'?' on':'');
  document.getElementById('clL').className='clp lst'+(f==='last'?' on':'');
  render();
}
function applyCustom(){
  var s=document.getElementById('dS').value,e=document.getElementById('dE').value;
  if(!s||!e){showToast('Set both dates');return;}
  csS=new Date(s+'T00:00:00');csE=new Date(e+'T00:00:00');
  if(csS>csE){showToast('Start must be before end');return;}
  render();
}
function clearCustom(){csS=null;csE=null;document.getElementById('dS').value='';document.getElementById('dE').value='';render();}

// ── Avg to connect ────────────────────────────────────────────────────────────
function avgCon(arr){
  var byC={};
  arr.slice().sort(function(a,b){return new Date(a.time)-new Date(b.time);}).forEach(function(a){var id=a.personId||'x';if(!byC[id])byC[id]=[];byC[id].push(a);});
  var tots=[];
  Object.keys(byC).forEach(function(id){var seq=byC[id],r=0;for(var i=0;i<seq.length;i++){r++;if(seq[i].outcome==='Connected'){tots.push(r);r=0;}}});
  if(!tots.length)return null;
  return Math.round(tots.reduce(function(a,b){return a+b;},0)/tots.length*10)/10;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  var data=load();
  var r=getRange(period,frame),filtered=filt(data.attempts,r);
  var altF=[];
  if(period!=='all'&&period!=='custom'){
    altF=filt(data.attempts,getRange(period,frame==='current'?'last':'current'));
  }
  document.getElementById('cname').textContent=pname||'—';
  document.getElementById('rbanner').innerHTML='<strong>'+rl(period,frame)+'</strong>';

  var totA=filtered.length,totC=filtered.filter(function(a){return a.outcome==='Connected';}).length;
  var rate=totA>0?Math.round((totC/totA)*100):null,avg=avgCon(filtered);
  var altA=altF.length,altC=altF.filter(function(a){return a.outcome==='Connected';}).length;

  document.getElementById('mA').textContent=totA;
  document.getElementById('mC').textContent=totC;
  document.getElementById('mR').textContent=rate!==null?rate+'%':'—';
  document.getElementById('mQ').textContent=avg!==null?avg+'x':'—';
  document.getElementById('mR').style.color=rate===null?'var(--muted)':rate>=20?'var(--green)':rate>=10?'var(--orange)':'var(--red)';

  var canD=period!=='all'&&period!=='custom';
  function dh(cur,prv){
    if(!canD)return'';
    var d=cur-prv;
    if(d===0)return'<span class="sd fl">= same</span>';
    return'<span class="sd '+(d>0?'up':'dn')+'">'+(d>0?'▲+':'▼')+d+'</span>';
  }
  document.getElementById('dA').innerHTML=dh(totA,altA);
  document.getElementById('dC').innerHTML=dh(totC,altC);

  var c={'No Answer':0,'Left Voicemail':0,'Connected':0,'Wrong Number':0};
  filtered.forEach(function(a){if(c[a.outcome]!==undefined)c[a.outcome]++;});
  document.getElementById('bNA').textContent=c['No Answer'];
  document.getElementById('bVM').textContent=c['Left Voicemail'];
  document.getElementById('bCN').textContent=c['Connected'];
  document.getElementById('bWN').textContent=c['Wrong Number'];

  document.getElementById('histCount').textContent=filtered.length;
  var list=document.getElementById('logList');
  if(!filtered.length){list.innerHTML='<div class="empty">No calls in this period</div>';}
  else{
    var html='';
    filtered.slice().reverse().forEach(function(a){
      var col=OC[a.outcome]||'#6b7280',d=new Date(a.time);
      var ts=d.toLocaleDateString([],{month:'short',day:'numeric'})+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      var isC=a.outcome==='Connected';
      html+='<div class="le'+(isC?' con':'')+'">' +
        '<div class="edot" style="background:'+col+'"></div>' +
        '<div class="eb">' +
          '<div class="eo" style="color:'+col+'">'+escH(a.outcome)+(isC?'<span class="cbadge">Conv</span>':'')+'</div>' +
          (a.personName?'<div class="en">'+escH(a.personName)+'</div>':'') +
          (a.note?'<div class="enote">'+escH(a.note)+'</div>':'') +
        '</div>' +
        '<div class="et">'+ts+'</div></div>';
    });
    list.innerHTML=html;
  }
  renderGoal(data.attempts);
}

// ── Goal ──────────────────────────────────────────────────────────────────────
function renderGoal(attempts){
  if(!attempts)attempts=load().attempts;
  var g=getGoal(),s=new Date();s.setHours(0,0,0,0);
  var today=attempts.filter(function(a){return new Date(a.time)>=s;}).length;
  var pct=g>0?Math.min(Math.round((today/g)*100),999):0;
  document.getElementById('gToday').textContent=today;
  document.getElementById('gTarget').textContent=g;
  document.getElementById('gPct').textContent=pct+'%';
  var fill=document.getElementById('gFill');
  fill.style.width=Math.min(pct,100)+'%';
  fill.className='gfill'+(today>g?' over':today===g&&g>0?' hit':'');
  var msg=document.getElementById('gMsg'),col='var(--muted)';
  if(!today){msg.textContent='Start!';}
  else if(today<g){msg.textContent=(g-today)+' to go';col='var(--blue)';}
  else if(today===g){msg.textContent='🎉 Done!';col='var(--green)';}
  else{msg.textContent='🔥 +'+(today-g);col='var(--orange)';}
  msg.style.color=col;
  document.getElementById('gPct').style.color=col;
}
function adjGoal(d){saveGoal(Math.max(5,getGoal()+d));renderGoal();}

// ── Log ───────────────────────────────────────────────────────────────────────
function doLog(outcome){
  var note=document.getElementById('noteInput').value.trim(),data=load();
  data.attempts.push({id:'a_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),outcome:outcome,note:note,time:new Date().toISOString(),personId:pid||null,personName:pname||null});
  save(data);
  document.getElementById('noteInput').value='';
  render();
  showToast('✓ '+outcome+(outcome==='Connected'?' + Conv':'')+(pname?' · '+pname:''));
}

// ── Section toggles ───────────────────────────────────────────────────────────
function toggleSec(id){
  secOpen[id]=!secOpen[id];
  document.getElementById('body-'+id).classList.toggle('open',secOpen[id]);
  document.getElementById('chev-'+id).classList.toggle('open',secOpen[id]);
}

// ── CSV ───────────────────────────────────────────────────────────────────────
function exportCSV(all){
  var data=load(),arr=all?data.attempts:filt(data.attempts,getRange(period,frame));
  if(!arr.length){showToast('No data');return;}
  var rows=[['Date','Time','Contact Name','Contact ID','Outcome','Conversation','Note']];
  arr.forEach(function(a){
    var d=new Date(a.time);
    rows.push([d.toLocaleDateString([],{year:'numeric',month:'2-digit',day:'2-digit'}),d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}),a.personName||'',a.personId||'',a.outcome||'',a.outcome==='Connected'?'Yes':'No',(a.note||'').replace(/"/g,'""')]);
  });
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var lbl=all?'all':rl(period,frame).replace(/[^a-z0-9]/gi,'-').toLowerCase();
  var blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='calls-'+lbl+'.csv';a.click();URL.revokeObjectURL(url);
  showToast('✓ '+arr.length+' records exported');
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function showReset(){document.getElementById('ci').value='';document.getElementById('cok').classList.remove('on');document.getElementById('ov').classList.add('on');setTimeout(function(){document.getElementById('ci').focus();},80);}
function hideReset(){document.getElementById('ov').classList.remove('on');}
function checkReset(v){document.getElementById('cok').classList.toggle('on',v.trim().toUpperCase()==='RESET');}
function doReset(){save({attempts:[]});hideReset();render();showToast('All data reset.');}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2400);}
function escH(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)hideReset();});
</script>
